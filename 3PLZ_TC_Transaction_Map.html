  {id:"TC-IPSec-VTI-001",grp:"IPSec-VTI",layer:"Transport",dir:"Control",risk:"High",

  {id:"TC-IPSec-VTI-006",grp:"IPSec-VTI",layer:"Transport",dir:"Control",risk:"High",

  {id:"TC-IPSec-VTI-007",grp:"IPSec-VTI",layer:"Transport",dir:"Control",risk:"High",

  {id:"TC-IPSec-VTI-008",grp:"IPSec-VTI",layer:"Transport",dir:"Control",risk:"Medium",

  {id:"TC-IPSec-VTI-009",grp:"IPSec-VTI",layer:"Transport",dir:"Control",risk:"High",
   src:"strongSwan\n(permanent PSK, vault://ipsec-psk/t01/swanctl-peer)",

   dst:"Vendor edge: vti0 UP with site-specific PSK\nsecrets.conf export: no %any entry",

  {id:"TC-IPSec-CM-001",grp:"IPSec-CM",layer:"Transport",dir:"Control",risk:"High",

   path:"swanctl.conf WITHOUT vti_interface → swanctl --initiate POC-POLICY-CHILD → XFRM SAs installed (ip xfrm state) → XFRM policies installed (ip xfrm policy, inbound + outbound) → NO vti0 interface → traffic within selector encrypted inline",

  {id:"TC-IPSec-CM-002",grp:"IPSec-CM",layer:"Transport",dir:"Control",risk:"High",

  {id:"TC-IPSec-CM-003",grp:"IPSec-CM",layer:"Transport",dir:"Control",risk:"High",

   dst:"Vendor edge: IKE SA + IPSec SA under crypto-map\nshow crypto ipsec sa: encaps/decaps counters increment",

  {id:"TC-IPSec-CM-004",grp:"IPSec-CM",layer:"Transport",dir:"Control",risk:"High",
   src:"Cisco CSR / Cat 8000v\n(native crypto-map + permanent PSK, vault://ipsec-psk/t01/csr-cm-peer)",
   path:"PSK keyring substituted for cert auth → trigger interesting traffic → IKE SA with PSK auth + ACL selector enforced\nNegative: wrong-PSK → AUTHENTICATION_FAILED",

  {id:"TC-IPSec-XFORM-001",grp:"IPSec-XFORM",layer:"Transport",dir:"Control",risk:"Critical",
   src:"All four VTI peers simultaneously:\nCisco IOS / PAN-OS / Arista CloudEOS / strongSwan",
   path:"Capture IKEv2 SA_INIT + IKE_AUTH exchanges on all 4 peers → Wireshark decode SA payload → verify selected proposal per peer:\nCisco IOS: AES-256-CBC + SHA-384 + Group 19 (Group 14 flagged)\nPAN-OS: AES-256-GCM + SHA-384 + Group 19\nArista: AES-256-GCM + SHA-384 + Group 19\nstrongSwan: AES-256-GCM-128 + SHA-384 + ECP-256",
   dst:"Compliance matrix table (4 peers)\nWireshark IKEv2 SA_INIT decode: SA payload with selected proposal for all 4 peers",
   note:"Critical crypto compliance gate. References NIST SP 800-77r1 + CNSA 1.0. Compliance matrix in evidence bundle."},

  {id:"TC-IPSec-XFORM-002",grp:"IPSec-XFORM",layer:"Transport",dir:"Control",risk:"Critical",
   src:"All four VTI + crypto-map tunnels\nstrongSwan negative test: NULL encryption / no-PFS proposals",
   path:"Record active IPSec SA transform from CLI (all peers) → confirm AES-256-GCM + PFS Group 19 for each → strongSwan negative: attempt NULL encryption proposal → NO_PROPOSAL_CHOSEN → attempt no-PFS proposal → NO_PROPOSAL_CHOSEN",
   dst:"All IPSec SAs: AES-256-GCM + PFS Group 19 confirmed\nNULL/no-PFS: NO_PROPOSAL_CHOSEN from vendor edge",
   note:"Data-plane encryption + PFS non-negotiable. pcap of SA rekey + vendor edge reject notification required."},

  {id:"TC-IPSec-XFORM-003",grp:"IPSec-XFORM",layer:"Transport",dir:"Control",risk:"Critical",
   src:"strongSwan\n(6 separate negative test proposals)",
   path:"For each weak algorithm (run separately):\nTest 1 DES: proposals=des-sha1-modp768! → NO_PROPOSAL_CHOSEN\nTest 2 3DES: proposals=3des-sha1-modp1024! → NO_PROPOSAL_CHOSEN\nTest 3 MD5: proposals=aes256-md5-modp1024! → NO_PROPOSAL_CHOSEN\nTest 4 DH Grp 1: proposals=aes256gcm128-prfsha384-modp768! → NO_PROPOSAL_CHOSEN\nTest 5 DH Grp 2: proposals=aes256gcm128-prfsha384-modp1024! → NO_PROPOSAL_CHOSEN\nTest 6 DH Grp 5: proposals=aes256gcm128-prfsha384-modp1536! → NO_PROPOSAL_CHOSEN",
   dst:"Vendor edge: 6 × NO_PROPOSAL_CHOSEN\nWireshark decode: IKEv2 NOTIFY(NO_PROPOSAL_CHOSEN) for each weak algorithm (6 pcaps)",
   note:"Cipher hygiene enforcement. References NIST SP 800-131Ar2 + CNSA 1.0. Six separate pcap evidence files."},

  {id:"TC-IPSec-LIFE-001",grp:"IPSec-LIFE",layer:"Transport",dir:"Control",risk:"High",
   src:"strongSwan\n(VTI spin-up, declared: 192.0.2.0/24, undeclared: 203.0.113.0/24)",
   path:"swanctl --initiate → vti0 UP → IKEv2 complete → IPSec SA installed → VR route table: 192.0.2.0/24 present via vti0 → 203.0.113.0/24 absent → send traffic from 203.0.113.0/24: dropped at vendor edge prefix filter",
   dst:"Vendor edge route table: declared prefix present, undeclared absent\npcap: undeclared traffic dropped",
   note:"Transport correctness gate for all CR tests. ip link + ip route + vendor API route table export."},

  {id:"TC-IPSec-LIFE-002",grp:"IPSec-LIFE",layer:"Transport",dir:"Control",risk:"High",
   src:"strongSwan\n(VTI active → administratively torn down)",
   path:"Pre-teardown: confirm vti0 UP + route present + ip xfrm state populated → Tear down tunnel (swanctl --terminate) → Confirm: vti0 DOWN → ip xfrm state empty → ip xfrm policy empty → route withdrawn from vendor edge routing table",
   dst:"Post-teardown: vti0 DOWN + all XFRM state empty + route absent in vendor edge",
   note:"Zero residual state. ip xfrm state (empty) + ip xfrm policy (empty) + ip route (route absent) + vendor API export."},

  {id:"TC-IPSec-LIFE-003",grp:"IPSec-LIFE",layer:"Transport",dir:"Control",risk:"High",
   src:"strongSwan\n(DPD: 30s interval, 120s timeout, dpd_action=restart)",
   path:"Confirm DPD INFORMATIONAL exchanges at 30s intervals (pcap) → Block IKE traffic to simulate peer failure → Wait DPD timeout (120s) → IKE SA cleared → Restore connectivity → New IKE_SA_INIT initiated → tunnel re-established (no operator intervention)",
   dst:"Vendor edge: IKE SA cleared at DPD timeout\nNew IKE_SA_INIT on recovery → tunnel re-established\npcap: DPD INFORMATIONAL exchanges then IKE_SA_INIT",
   note:"Operational resilience. Also validates Partner-ABC active/passive failover behavior (Router-A → Router-B transition)."},

  {id:"TC-IPSec-LIFE-004",grp:"IPSec-LIFE",layer:"Transport",dir:"Control",risk:"High",
   src:"strongSwan\n(shortened lifetimes: IKE SA 5m, IPSec SA 2m)\ncontinuous ping to CVS-side backend active",
   path:"Continuous ping running → Wait IPSec SA lifetime (2 min) → pcap: CREATE_CHILD_SA with KE payload (new key material) → confirm no ping drops → Wait IKE SA lifetime (5 min) → pcap: full IKE_SA_INIT rekey → confirm no ping drops → new SPI in ESP headers",
   dst:"Vendor edge: SA rekey transparent to data plane\npcap: CREATE_CHILD_SA + IKE_SA_INIT rekey\nping log: zero drops throughout",
   note:"SA lifetimes shortened for test only (production: IKE SA 8h / IPSec SA 1h). New SPI in ESP headers confirms fresh key material."},

  {id:"TC-IPSec-LIFE-005",grp:"IPSec-LIFE",layer:"Transport",dir:"Control",risk:"Critical",
   src:"strongSwan\n(active VTI cert-auth tunnel — peer cert then revoked)",
   path:"Active VTI tunnel confirmed → Revoke peer cert at CA → Update CRL → Notify OCSP responder → Wait CRL TTL → Attempt IKE re-establishment → Vendor edge: AUTHENTICATION_FAILED (revoked cert)\n→ Issue new peer cert → Re-attempt IKE → tunnel re-established",
   dst:"After CRL refresh: IKE re-establishment blocked (AUTHENTICATION_FAILED)\nAfter new cert: tunnel re-established\nEvidence: CRL export (revoked serial) + two IKE_AUTH pcaps",
   note:"PKI lifecycle control for tunnel security. Parallel to TC-CR01-004. Harness §5.4.2 OCSP+CRL."},

  {id:"TC-SVCINFRA-CERT-001",grp:"SVCINFRA-CERT",layer:"SVCINFRA",dir:"Enrollment",risk:"High",
   src:"Partner user / machine user\n(user ID registered in tenant t01 directory)",
   path:"HTTPS POST userid → Cert Delivery Web Service [directory lookup: userid exists, active, tenant-scoped] → Email OTP Service [dispatch time-bounded OTP to registered email address] → Partner email inbox → HTTPS POST userid + OTP → Cert Delivery Web Service [OTP validated: time-bounded, single-use] → Tenant t01 CA [generate key pair + sign cert: SAN=userid email, EKU=clientAuth, issuer=tenant intermediate CA] → cert + private key returned to partner",
   dst:"Partner: signed cert + private key received\nAudit event: cert_issued logged\nEmail delivery log: OTP dispatched to correct address",
   note:"Positive path. Platform-generated cert. Gate for all CR-01 tests — cert profile must be correct before mTLS tests run."},

  {id:"TC-SVCINFRA-CERT-002",grp:"SVCINFRA-CERT",layer:"SVCINFRA",dir:"Enrollment",risk:"High",
   src:"Partner user / machine user\n(pre-generated CSR: correct key size, SAN=userid email, EKU=clientAuth)",
   path:"Generate CSR (min 2048-bit RSA or P-256 ECDSA, SAN=userid, EKU=clientAuth) → HTTPS POST userid → Cert Delivery Web Service [directory lookup] → Email OTP Service [dispatch OTP to registered email] → Partner email inbox → HTTPS POST userid + OTP + CSR → Cert Delivery Web Service [OTP validated + CSR profile validated: key size, SAN matches userid, key usage correct] → Tenant t01 CA [sign CSR] → signed cert returned (private key NOT returned — held by requester)",
   dst:"Partner: signed cert received (no private key in response)\nCert: SAN=userid, issuer=tenant t01 intermediate CA, EKU=clientAuth\nAudit event: cert_issued (CSR path)",
   note:"CSR upload path. Private key never transits the cert delivery service. openssl x509 -text decode required as evidence."},

  {id:"TC-SVCINFRA-CERT-003",grp:"SVCINFRA-CERT",layer:"SVCINFRA",dir:"Enrollment",risk:"Critical",
   src:"Partner user\n(valid userid, wrong OTP submitted)",
   path:"HTTPS POST userid → Cert Delivery Web Service [directory lookup: valid] → Email OTP Service [OTP dispatched] → HTTPS POST userid + WRONG OTP → Cert Delivery Web Service [OTP validation fails] → 401/403 error returned — NO cert generated, NO key pair generated",
   dst:"Error response: OTP validation failed\nNo cert operation performed\nAudit event: otp_validation_failed\nNo key material generated or stored",
   note:"Wrong OTP must terminate the transaction before any CA operation. Audit log must confirm no cert_issued event."},

  {id:"TC-SVCINFRA-CERT-004",grp:"SVCINFRA-CERT",layer:"SVCINFRA",dir:"Enrollment",risk:"High",
   src:"Partner user\n(valid userid, OTP allowed to expire before submission)",
   path:"HTTPS POST userid → Cert Delivery Web Service → Email OTP Service [OTP dispatched with TTL=N minutes] → WAIT: TTL expires → HTTPS POST userid + expired OTP → Cert Delivery Web Service [OTP TTL check fails] → error returned: OTP expired",
   dst:"Error response: OTP expired\nNo cert generated\nAudit event: otp_expired",
   note:"OTP TTL must be enforced. TTL value documented and consistent with cert delivery session window. Two-phase: confirm OTP accepted before TTL, rejected after."},

  {id:"TC-SVCINFRA-CERT-005",grp:"SVCINFRA-CERT",layer:"SVCINFRA",dir:"Enrollment",risk:"High",
   src:"Harness client\n(unregistered userid submitted — not in tenant directory)",
   path:"HTTPS POST unregistered-userid → Cert Delivery Web Service [directory lookup: userid NOT found] → generic error returned — response MUST be indistinguishable from wrong-OTP error → NO OTP dispatched → NO cert operation",
   dst:"Generic error response (no user enumeration signal)\nNo OTP email sent\nNo cert generated\nAudit event: lookup_failed (internal only — not exposed in response)",
   note:"User enumeration prevention. Response body and timing must not distinguish 'userid not found' from 'wrong OTP'. Prevents directory harvesting."},

  {id:"TC-SVCINFRA-CERT-006",grp:"SVCINFRA-CERT",layer:"SVCINFRA",dir:"Enrollment",risk:"High",
   src:"Partner user\n(replays previously consumed OTP within TTL window)",
   path:"HTTPS POST userid → OTP dispatched → HTTPS POST userid + OTP (first use: success, cert received) → HTTPS POST userid + SAME OTP again (reuse attempt within TTL) → Cert Delivery Web Service [OTP state: CONSUMED] → error returned: OTP already used",
   dst:"First use: cert issued\nSecond use: rejected — OTP consumed\nAudit event: otp_replay_rejected",
   note:"OTP must be single-use. Consumed on first successful validation even if TTL has not expired."},

  {id:"TC-SVCINFRA-CERT-007",grp:"SVCINFRA-CERT",layer:"SVCINFRA",dir:"Enrollment",risk:"Medium",
   src:"Harness client\n(rapid repeated OTP requests for same userid)",
   path:"HTTPS POST userid (request 1) → OTP dispatched → HTTPS POST userid (request 2, within rate-limit window) → OTP dispatched or throttled → ... repeat to configured limit → Cert Delivery Web Service [rate limiter: per-userid request count exceeded] → 429 Too Many Requests returned",
   dst:"Requests within limit: OTP dispatched\nRequests exceeding limit: 429 returned\nAudit event: rate_limit_triggered",
   note:"Rate limit prevents OTP brute force via repeated request/guess cycles. Limit value and window documented as evidence."},

  {id:"TC-SVCINFRA-CERT-008",grp:"SVCINFRA-CERT",layer:"SVCINFRA",dir:"Enrollment",risk:"High",
   src:"Partner user\n(CSR with undersized RSA key: 1024-bit)",
   path:"Generate weak CSR (1024-bit RSA key) → HTTPS POST userid → OTP dispatched → HTTPS POST userid + OTP + weak CSR → Cert Delivery Web Service [CSR profile validation: key size below minimum] → error returned: insufficient key size",
   dst:"CSR rejected — key size below minimum accepted threshold\nAudit event: csr_rejected (key_size)\nNo cert signed",
   note:"Minimum key size enforced (2048-bit RSA or P-256 ECDSA). Prevents weak key material from entering the tenant PKI."},

  {id:"TC-SVCINFRA-CERT-009",grp:"SVCINFRA-CERT",layer:"SVCINFRA",dir:"Enrollment",risk:"Critical",
   src:"Partner user\n(CSR with SAN set to different email — not the authenticated userid)",
   path:"Generate CSR with SAN=attacker@other-tenant.com (does NOT match authenticated userid) → HTTPS POST userid → OTP dispatched and validated → HTTPS POST userid + OTP + mismatched-SAN CSR → Cert Delivery Web Service [CSR profile validation: SAN ≠ authenticated userid] → CSR rejected",
   dst:"CSR rejected: SAN must match authenticated userid\nAudit event: csr_rejected (san_mismatch)\nNo cert signed",
   note:"Critical identity binding control. A cert with SAN ≠ authenticated userid would allow impersonation in mTLS. Rejection must occur post-OTP-validation, not silently."},

  {id:"TC-SVCINFRA-CERT-010",grp:"SVCINFRA-CERT",layer:"SVCINFRA",dir:"Enrollment",risk:"High",
   src:"Partner user\n(CSR with key usage = serverAuth only, no clientAuth EKU)",
   path:"Generate CSR with EKU=serverAuth only (omitting clientAuth) → HTTPS POST userid → OTP validated → HTTPS POST userid + OTP + wrong-EKU CSR → Cert Delivery Web Service [CSR profile validation: EKU missing clientAuth] → rejected OR cert issued with platform-enforced clientAuth EKU",
   dst:"Option A (reject): CSR rejected — EKU profile non-compliant\nOption B (enforce): cert issued with clientAuth EKU regardless of CSR request\nAudit event records outcome\nExpected behaviour documented as vendor commitment",
   note:"Platform must either reject or enforce correct EKU. A cert without clientAuth EKU will fail mTLS handshake at the proxy — this test surfaces the failure mode before CR-01 runs."},

  {id:"TC-SVCINFRA-CERT-011",grp:"SVCINFRA-CERT",layer:"SVCINFRA",dir:"Enrollment",risk:"High",
   src:"Harness engineer\n(certs from TC-SVCINFRA-CERT-001 and TC-SVCINFRA-CERT-002)",
   path:"openssl x509 -text -noout on cert from platform-gen path → verify: Subject=userid email, SAN=userid email, Issuer=tenant t01 intermediate CA (NOT shared root), EKU=clientAuth present, validity period within configured window, serial unique across tenant\nopenssl x509 -text -noout on cert from CSR path → verify same fields",
   dst:"Both certs: all profile fields confirmed correct\nIssuing CA: tenant t01 intermediate (not shared platform root)\nNo extra SANs beyond userid email\nSerial numbers unique",
   note:"Profile validation gate. Must pass before TC-CR01-001 runs. Failure here explains CR-01 results that would otherwise be ambiguous about platform vs cert profile."},

  {id:"TC-SVCINFRA-OTP-001",grp:"SVCINFRA-OTP",layer:"SVCINFRA",dir:"Enrollment",risk:"High",
   src:"Partner user\n(cert delivery OTP request — email channel)",
   path:"HTTPS POST userid to cert delivery endpoint → Cert Delivery Web Service [triggers email OTP dispatch] → Email OTP Service [generates time-bounded OTP, dispatches to registered email address for userid] → Partner email inbox: OTP received → verify: delivered to registered address only, delivered within configured timeout window",
   dst:"OTP email: received at registered address\nDelivery log: confirms correct destination address\nNot delivered to any other address\nDelivery latency within configured window",
   note:"Email delivery channel verification for cert path. Evidence: email delivery service log + received email headers confirming destination address."},

  {id:"TC-SVCINFRA-OTP-002",grp:"SVCINFRA-OTP",layer:"SVCINFRA",dir:"Enrollment",risk:"High",
   src:"Partner user\n(email OTP — TTL enforcement test)",
   path:"HTTPS POST userid → Email OTP Service [OTP dispatched with TTL=N minutes] → receive OTP → test before TTL: submit OTP → accepted → WAIT: TTL expires → test after TTL: submit same OTP → Cert Delivery Web Service [OTP TTL check: EXPIRED] → rejected",
   dst:"Pre-TTL submission: OTP accepted\nPost-TTL submission: OTP rejected (expired)\nTTL boundary documented and consistent with cert session window",
   note:"Email channel TTL enforcement. Two submissions required as evidence — accepted before, rejected after."},

  {id:"TC-SVCINFRA-OTP-003",grp:"SVCINFRA-OTP",layer:"SVCINFRA",dir:"Enrollment",risk:"Critical",
   src:"Partner user\n(email OTP — single-use enforcement)",
   path:"HTTPS POST userid → Email OTP dispatched → HTTPS POST userid + OTP (first use, within TTL) → cert issued → HTTPS POST userid + SAME OTP (second use, still within TTL) → Cert Delivery Web Service [OTP state: CONSUMED] → rejected",
   dst:"First use: cert issued\nSecond use (within TTL): rejected — OTP consumed on first validation\nAudit event: otp_replay_rejected",
   note:"Critical. OTP must be single-use even within TTL window. An OTP reusable within its TTL is effectively a static password for the delivery session."},

  {id:"TC-SVCINFRA-OTP-004",grp:"SVCINFRA-OTP",layer:"SVCINFRA",dir:"Enrollment",risk:"High",
   src:"Partner user / machine user\n(SSH/SFTP OTP request — text/SMS channel via CURL)",
   path:"curl -X POST [otp-service]/request -d userid=user@domain → OTP Service [directory lookup: userid active in tenant] → SMS/text dispatch [OTP delivered to registered phone number for userid] → Partner phone: OTP received as text message → verify: delivered to registered phone only, within configured timeout",
   dst:"OTP text: received on registered phone\nDelivery log: correct destination phone number\nNot delivered to any other number\nDelivery latency within SSH session establishment window",
   note:"Text/SMS channel for SSH proxy path. Separate delivery channel from email (cert path). Machine user proxy curl flow must work identically to human user."},

  {id:"TC-SVCINFRA-OTP-005",grp:"SVCINFRA-OTP",layer:"SVCINFRA",dir:"Enrollment",risk:"High",
   src:"Partner user\n(text/SMS OTP — TTL enforcement)",
   path:"curl POST userid → SMS OTP dispatched with TTL=N minutes → OTP received → test before TTL: present userid + OTP to SSH proxy → accepted → WAIT: TTL expires → test after TTL: present same OTP to SSH proxy → SSH proxy [OTP TTL check: EXPIRED] → authentication rejected",
   dst:"Pre-TTL: SSH proxy accepts userid + OTP → session proceeds to TOTP\nPost-TTL: SSH proxy rejects OTP — expired\nTTL boundary documented",
   note:"SMS channel TTL enforcement. TTL must be consistent with SSH session establishment window — long enough to be practical, short enough to be secure."},

  {id:"TC-SVCINFRA-OTP-006",grp:"SVCINFRA-OTP",layer:"SVCINFRA",dir:"Enrollment",risk:"Critical",
   src:"Partner user\n(text/SMS OTP — single-use enforcement in SSH proxy context)",
   path:"curl POST userid → SMS OTP dispatched → present userid + OTP to SSH proxy (first use, within TTL) → SSH proxy [OTP validated: CONSUMED] → session proceeds → attempt second SSH connection with same OTP (within TTL) → SSH proxy [OTP state: CONSUMED] → authentication rejected before backend connection",
   dst:"First SSH session: OTP accepted, session proceeds\nSecond attempt with same OTP: rejected — OTP consumed\nAudit event: otp_replay_rejected\npcap: no backend connection on second attempt",
   note:"Critical. SMS OTP single-use in SSH proxy path. A reusable SMS OTP within its TTL would allow session hijack by OTP interception."},

  {id:"TC-SVCINFRA-OTP-007",grp:"SVCINFRA-OTP",layer:"SVCINFRA",dir:"Enrollment",risk:"High",
   src:"Harness client\n(unregistered userid — submitted to both OTP channels)",
   path:"Email channel: HTTPS POST unregistered-userid to cert delivery endpoint → generic error returned (indistinguishable from wrong-OTP error) → NO OTP email dispatched\nSMS channel: curl POST unregistered-userid to OTP service → generic error returned → NO SMS dispatched",
   dst:"Both channels: generic error (no user enumeration signal)\nNo OTP dispatched on either channel\nResponse body and HTTP status code must not reveal whether userid exists",
   note:"User enumeration prevention on both delivery channels. Timing consistency also required — response latency must not leak directory lookup result."},

  {id:"TC-SVCINFRA-OTP-008",grp:"SVCINFRA-OTP",layer:"SVCINFRA",dir:"Enrollment",risk:"Medium",
   src:"Harness client\n(rapid repeated OTP requests — both channels, same userid)",
   path:"Email channel: repeat HTTPS POST userid in short window → Email OTP Service [per-userid rate limiter] → 429 after configured request limit\nSMS channel: repeat curl POST userid in short window → OTP Service [per-userid rate limiter] → 429 / throttle response after configured limit",
   dst:"Both channels: 429 or throttle response after limit exceeded\nAudit event: rate_limit_triggered (per channel)\nRate limit parameters (count, window) documented",
   note:"Independent rate limiters required on both channels. Rate limit prevents iterative OTP harvesting across both delivery paths."},

  {id:"TC-SVCINFRA-OTP-009",grp:"SVCINFRA-OTP",layer:"SVCINFRA",dir:"Enrollment",risk:"High",
   src:"Machine user proxy\n(userid registered as machine user in tenant directory — curl OTP flow)",
   path:"curl -X POST [otp-service]/request -d userid=machineuser@domain → OTP Service [directory lookup: machine user ID active in tenant, registered phone number present] → SMS OTP dispatched to registered number → machine user proxy receives OTP (automated or monitored) → curl presents userid + OTP to SSH proxy → SSH proxy [OTP validated] → vault credential injected → SSH session to enterprise target established",
   dst:"Machine user: SSH session established via proxy\nSSH proxy audit log: machine user ID shown as session identity\nVault read event: credential injected\nOTP consumption logged — machine user path identical to human user path",
   note:"Machine user proxy flow must traverse identical authentication chain to human user. No bypass or exemption. userid@domain format applies to both human and machine users."},
  {id:"TC-IPSec-ASA-001",grp:"IPSec-ASA",risk:"High",
   src:"Cisco ASA (ASAv / FTD)\n(Partner-side, crypto-map, IKEv2, cert auth)",
   path:"ASA [crypto ikev2 policy + proposal POC-PROPOSAL + profile POC-IKE-PROF] → IKE_SA_INIT (AES-256-GCM + SHA-384 + Group 19) → UDP/500 → Internet Zone → IKE_AUTH (cert: POC-PEER-CA, trustpoint enrollment) → IKE SA ESTABLISHED → IPSec SA: ESP AES-256-GCM + PFS Group 19 → crypto-map POC-MAP applied on outside interface",
   dst:"Vendor edge: IKE SA + IPSec SA under crypto-map\nshow crypto ikev2 sa + show crypto ipsec sa: encaps/decaps increment",
   note:"Policy-based only (no VTI). Config: crypto map POC-MAP 10 ipsec-isakmp + match address ACL-POC-ENCRYPT."},
  {id:"TC-IPSec-ASA-002",grp:"IPSec-ASA",risk:"High",
   src:"Cisco ASA\n(PSK auth, vault://ipsec-psk/t01/asa-peer, peer-scoped)",
   path:"ASA [ikev2 keyring: peer <vendor-edge-ip> pre-shared-key <PSK>] → IKE_SA_INIT → IKE_AUTH (PSK, peer-scoped) → IKE SA ESTABLISHED (PSK)\nNEGATIVE: wrong-PSK attempt → AUTHENTICATION_FAILED",
   dst:"Vendor edge: IKE SA with PSK auth\nKeyring config: peer-specific entry, no wildcard\nWrong-PSK: AUTHENTICATION_FAILED",
   note:"No wildcard PSK. Config: tunnel-group <vendor-edge-ip> type ipsec-l2l + ipsec-attributes pre-shared-key <PSK>."},
  {id:"TC-IPSec-ASA-003",grp:"IPSec-ASA",risk:"Critical",
   src:"Cisco ASA\n(SCEP cert enrollment to tenant t01 CA)",
   path:"ASA [crypto ca trustpoint POC-CA] → enrollment url http://[t01-CA]/certsrv/mscep/mscep.dll → crypto ca authenticate POC-CA (fetch CA cert) → crypto ca enroll POC-CA (submit CSR, receive signed cert) → cert installed in trustpoint → IKE profile references POC-CA",
   dst:"ASA: signed cert installed in trustpoint POC-CA\nCA: cert serial in issued list\nIKE profile: cert auth operational\nshow crypto ca certificates: POC-CA chain present",
   note:"SCEP enrollment pre-flight for cert-auth tests. Enrollment must succeed before ASA-001 runs."},
  {id:"TC-IPSec-ASA-004",grp:"IPSec-ASA",risk:"High",
   src:"Cisco ASA\n(DPD: crypto ikev2 enable outside dpd 30 2 on-demand)",
   path:"Confirm DPD INFORMATIONAL exchanges at 30s intervals (pcap) → Block IKE traffic (simulate peer failure) → DPD timeout (60s: 30s × 2 retries) → IKE SA cleared by ASA → Restore connectivity → ASA re-initiates IKE_SA_INIT (on-demand trigger: new interesting traffic) → tunnel re-established",
   dst:"Vendor edge: IKE SA cleared at DPD timeout\nASA re-initiates on new traffic trigger → tunnel re-established\nshow crypto ikev2 sa: new SA established",
   note:"ASA DPD uses on-demand mode — re-initiation triggered by traffic, not dpd_action=restart. Re-establishment evidence: new IKE_SA_INIT in pcap."},
  {id:"TC-IPSec-ASA-005",grp:"IPSec-ASA",risk:"High",
   src:"Cisco ASA\n(SA rekey: shortened lifetimes for test — IKE 5m, IPSec 2m)",
   path:"Continuous ping active → Wait IPSec SA lifetime (2 min) → ASA initiates INFORMATIONAL rekey (or new IKE_AUTH for full rekey) → new CHILD_SA with new SPI → ping log: zero drops → Wait IKE SA lifetime (5 min) → full IKE rekey → ping log: zero drops",
   dst:"ASA: new SPI in show crypto ipsec sa\nPing log: zero drops throughout both rekey events\npcap: CREATE_CHILD_SA or new IKE_AUTH exchange",
   note:"ASA SA rekey behaviour may differ from IOS-XE — some ASA versions do full IKE re-auth on IPSec rekey. Document observed behaviour."},
  {id:"TC-IPSec-ASA-006",grp:"IPSec-ASA",risk:"Critical",
   src:"Cisco ASA\n(6 weak algorithm negative proposals)",
   path:"Test 1: crypto ikev2 policy with DES → IKE_SA_INIT → NO_PROPOSAL_CHOSEN\nTest 2: 3DES → NO_PROPOSAL_CHOSEN\nTest 3: MD5 PRF → NO_PROPOSAL_CHOSEN\nTest 4: DH Group 1 (modp768) → NO_PROPOSAL_CHOSEN\nTest 5: DH Group 2 (modp1024) → NO_PROPOSAL_CHOSEN\nTest 6: DH Group 5 (modp1536) → NO_PROPOSAL_CHOSEN",
   dst:"Vendor edge: 6 × NO_PROPOSAL_CHOSEN\n6 × Wireshark NOTIFY(NO_PROPOSAL_CHOSEN) pcaps",
   note:"Same cipher hygiene gate as TC-IPSec-XFORM-003. ASA-specific policy syntax: crypto ikev2 policy N with encryption/hash/group."},
  {id:"TC-IPSec-CONN-001",grp:"IPSec-CONN",risk:"High",
   src:"strongSwan harness host\n(tunnel established via TC-IPSec-VTI-008)",
   path:"Pre: confirm vti0 UP + CHILD_SA INSTALLED → Bidirectional ICMP: ping from harness host → enterprise target (through VTI) → enterprise target pings back → Bidirectional TCP: curl https://[enterprise-target] from harness host → response received → Reverse: enterprise-initiated TCP to harness host → response received",
   dst:"Both directions: ICMP replies received, TCP sessions established\nip xfrm state: encaps + decaps counters incrementing in both directions\npcap: ESP frames for all in-selector traffic",
   note:"Positive connectivity gate. Confirms bidirectional data plane after transport establishment."},
  {id:"TC-IPSec-CONN-002",grp:"IPSec-CONN",risk:"High",
   src:"strongSwan harness host\n(traffic in-selector vs out-of-selector)",
   path:"In-selector traffic (192.0.2.0/24 → 10.0.0.0/8): send packets → confirm ESP-encapsulated in pcap → ip xfrm counters: encaps increment\nOut-of-selector traffic (192.0.2.0/24 → 8.8.8.8): send packets → confirm dropped at vendor edge prefix filter → ip xfrm counters: NO increment for out-of-selector",
   dst:"In-selector: ESP-encapsulated, counters increment\nOut-of-selector: dropped at prefix filter, no ESP encapsulation\npcap: two captures distinguishing in vs out traffic",
   note:"Traffic confinement. Complements TC-IPSec-LIFE-001 prefix filter test with active data plane verification."},
  {id:"TC-IPSec-CONN-003",grp:"IPSec-CONN",risk:"Critical",
   src:"strongSwan harness host\n(pcap on WAN-facing interface during active tunnel traffic)",
   path:"Establish tunnel → send high-volume in-selector traffic (TCP + ICMP, various ports) → capture WAN-facing interface during transmission → inspect all frames: no plaintext IP headers matching 192.0.2.0/24 → no unencapsulated TCP/UDP payloads → all in-selector traffic appears as ESP (proto 50) frames only",
   dst:"WAN pcap: zero plaintext frames for in-selector traffic\nAll in-selector traffic: ESP (protocol 50) frames only\nNo IP header leakage in WAN capture",
   note:"Critical. Plaintext leak = complete data exposure on WAN. pcap evidence is the primary artifact."},
  {id:"TC-IPSec-CONN-004",grp:"IPSec-CONN",risk:"High",
   src:"strongSwan harness host\n(large frame: 1400B payload — approaching MTU with tunnel overhead)",
   path:"Send TCP segments with 1400B payload through VTI → confirm receipt at enterprise target (no silent drop) → confirm no ICMP fragmentation-needed if DF bit set → validate MSS clamping in effect OR path MTU discovery working correctly → send 1500B payload → observe: fragmented or PMTUD-triggered MSS reduction",
   dst:"1400B payload: received at enterprise target intact\n1500B with DF: either MSS-clamped (no drop) or PMTUD-reduced and received\nNo silent drop of large frames",
   note:"MTU/fragmentation. ESP overhead (50B+) reduces effective payload MTU. Silent drops cause application-layer hangs. MSS clamping config must be documented."},
  {id:"TC-IPSec-CONN-005",grp:"IPSec-CONN",risk:"High",
   src:"strongSwan harness host\n(active TCP session + DPD simulation)",
   path:"Establish active long-lived TCP session (e.g. iperf or netcat) → Confirm DPD INFORMATIONAL at 30s intervals → Block IKE traffic (10s window, shorter than DPD timeout) → Restore IKE → DPD continues → Confirm: TCP session survives short IKE interruption → Extend block past DPD timeout → DPD clears SA → Confirm: TCP session RST or re-established after reconvergence",
   dst:"Short interruption (<DPD timeout): TCP session survives\nFull DPD timeout: SA cleared → TCP RST or re-establishment\nBehaviour documented per timeout threshold",
   note:"Session survival through DPD. Documents exact TCP behaviour at DPD boundary for operational runbook."},
  {id:"TC-IPSec-CONN-006",grp:"IPSec-CONN",risk:"High",
   src:"strongSwan harness host\n(active TCP session + SA rekey, shortened lifetimes)",
   path:"Establish active TCP session (iperf continuous stream) → Wait IPSec SA rekey (CREATE_CHILD_SA) → pcap: new SPI in ESP headers → Confirm: TCP stream continues without RST → Wait IKE SA rekey (IKE_SA_INIT) → pcap: new IKE SA → Confirm: TCP stream continues without RST → Byte counters at both ends: no gaps in stream",
   dst:"TCP stream: continuous, no RST during IPSec SA rekey\nTCP stream: continuous, no RST during IKE SA rekey\niperf report: no throughput gap during rekey events",
   note:"Session continuity through SA rekey. Shortened lifetimes: IPSec SA 2 min, IKE SA 5 min. Production lifetimes will have much lower rekey frequency."},
  {id:"TC-IPSec-CONN-007",grp:"IPSec-CONN",risk:"Medium",
   src:"strongSwan harness host\n(asymmetric path: tunnel up on primary, return path via secondary interface)",
   path:"Establish tunnel via primary WAN interface → Send traffic → Confirm symmetric ESP path (same interface both directions) → Simulate primary interface asymmetry (add secondary interface to return path) → Observe: ESP return path on secondary → Confirm: IKE SA maintained, CHILD_SA not torn down → Traffic continues with asymmetric ESP paths",
   dst:"IKE SA: maintained on primary\nESP return: secondary interface accepted\nno CHILD_SA teardown on asymmetric return",
   note:"Asymmetric path. Relevant for partners with ECMP or redundant uplinks where return ESP may arrive on different interface than outbound."},
  {id:"TC-ENT-VTI-001",grp:"ENT-VTI",risk:"High",
   src:"3PLZ Egress Proxy\n(pre-flight: /32 loopback reachability check)",
   path:"Pre-flight: 3PLZ platform pings/probes PA-FW /32 loopback address → confirm reachable from 3PLZ egress proxy source IP → ICMP echo reply confirms L3 path exists → traceroute to /32 loopback: confirms path, no intermediate NAT",
   dst:"PA-FW /32 loopback: reachable from 3PLZ\nICMP echo reply received within timeout\nNo intermediate NAT on path to /32",
   note:"Required pre-flight before ENT-VTI-002. /32 loopback unreachable = IKE_SA_INIT will silently fail."},
  {id:"TC-ENT-VTI-002",grp:"ENT-VTI",risk:"High",
   src:"3PLZ Egress Proxy\n(IKEv2 initiator, cert auth, targeting PA-FW /32 loopback)",
   path:"3PLZ [IKEv2 initiator: peer = PA-FW /32 loopback] → IKE_SA_INIT (AES-256-GCM + SHA-384 + Group 19) → UDP/500 → PA-FW /32 Loopback (Untrust Zone) → IKE_AUTH (cert: tenant-scoped credential) → PA-FW validates cert against t01 CA → IKE SA ESTABLISHED → IPSec SA: ESP AES-256-GCM + PFS Group 19 → VTI tunnel interface assigned to Tenant X Zone",
   dst:"PA-FW: IKE SA established, tunnel interface in Tenant X Zone\nshow vpn ike-sa + ipsec-sa + interface tunnel.N\nIKE peer: /32 loopback (Untrust Zone) confirmed",
   note:"Enterprise-side VTI establishment. IKE peer is /32 loopback in Untrust Zone — distinct from tunnel interface zone (Tenant X Zone)."},
  {id:"TC-ENT-VTI-003",grp:"ENT-VTI",risk:"High",
   src:"3PLZ Egress Proxy\n(IKEv2 initiator, PSK auth, vault://ipsec-psk/t01/ent-vti-peer)",
   path:"3PLZ [IKEv2 PSK initiator: peer-id = PA-FW /32 loopback IP] → IKE_SA_INIT → IKE_AUTH (PSK, peer-scoped) → IKE SA ESTABLISHED (PSK) → VTI in Tenant X Zone\nNEGATIVE: wrong-PSK → AUTHENTICATION_FAILED",
   dst:"PA-FW: IKE SA + VTI in Tenant X Zone (PSK auth)\nWrong-PSK: AUTHENTICATION_FAILED\nVault audit: one PSK read confirmed",
   note:"PSK must be per-peer scoped on both 3PLZ and PA-FW sides. No wildcard peer."},
  {id:"TC-ENT-VTI-004",grp:"ENT-VTI",risk:"Critical",
   src:"3PLZ Egress Proxy\n(VTI established for tenant t01 and tenant t02 separately)",
   path:"Establish t01 VTI → PA-FW: tunnel.t01 interface in Tenant-01-Zone → verify NOT in Untrust Zone, NOT in Tenant-02-Zone → Establish t02 VTI → PA-FW: tunnel.t02 interface in Tenant-02-Zone → verify NOT in Tenant-01-Zone → Confirm: no cross-zone routing between Tenant-01-Zone and Tenant-02-Zone",
   dst:"t01 tunnel interface: Tenant-01-Zone (confirmed)\nt02 tunnel interface: Tenant-02-Zone (confirmed)\nNo route from Tenant-01-Zone to Tenant-02-Zone\nshow zone-protection: each zone independent",
   note:"Zone assignment correctness gate. Wrong zone = cross-tenant traffic visibility. Must verify zone assignment via PA-FW API export."},
  {id:"TC-ENT-VTI-005",grp:"ENT-VTI",risk:"Critical",
   src:"3PLZ Egress Proxy\n(transform compliance on enterprise-side VTI)",
   path:"Capture IKE_SA_INIT + IKE_AUTH for enterprise-side VTI → Wireshark decode SA payload → Verify: IKE SA = AES-256-GCM + SHA-384 + Group 19 → Verify: IPSec SA = ESP AES-256-GCM + PFS Group 19\nNEGATIVE: propose weak algorithm → NO_PROPOSAL_CHOSEN from PA-FW",
   dst:"Enterprise-side VTI: AES-256-GCM + SHA-384 + Group 19 (both IKE and IPSec)\nWeak algorithm: NO_PROPOSAL_CHOSEN from PA-FW\nCompliance matrix entry for enterprise leg",
   note:"Same CNSA/NIST cipher baseline on enterprise leg as partner leg. PA-FW must reject weak proposals."},
  {id:"TC-ENT-VTI-006",grp:"ENT-VTI",risk:"High",
   src:"3PLZ Egress Proxy\n(DPD from 3PLZ toward PA-FW Active)",
   path:"Confirm DPD INFORMATIONAL at 30s intervals: 3PLZ → PA-FW Active (pcap) → PA-FW Active responds → Block traffic to PA-FW → DPD timeout → 3PLZ clears IKE SA → Restore traffic → 3PLZ re-initiates IKE_SA_INIT to PA-FW /32 loopback → tunnel re-established",
   dst:"DPD INFORMATIONAL: pcap confirms exchange at 30s intervals\nDPD timeout: IKE SA cleared on 3PLZ side\nRe-establishment: new IKE_SA_INIT to /32 loopback → tunnel UP",
   note:"DPD on enterprise leg. Re-establishment targets /32 loopback — if loopback has moved to new Active during outage, re-establishment must still succeed."},
  {id:"TC-ENT-VTI-007",grp:"ENT-VTI",risk:"High",
   src:"3PLZ Egress Proxy\n(SA rekey on enterprise-side VTI, shortened lifetimes)",
   path:"Active traffic flow through enterprise VTI → Shorten IPSec SA lifetime → Wait rekey → CREATE_CHILD_SA exchange → new SPI → traffic continues without drop → Shorten IKE SA lifetime → Wait IKE rekey → IKE_SA_INIT exchange → new IKE SA → traffic continues without drop",
   dst:"Enterprise VTI: SA rekey transparent to traffic\nNew SPI in ESP captures post-rekey\nZero traffic drops during both rekey events",
   note:"Enterprise-side VTI rekey. PA-FW may initiate or respond — document which side initiates in test evidence."},
  {id:"TC-ENT-VTI-008",grp:"ENT-VTI",risk:"Critical",
   src:"3PLZ Egress Proxy\n(both t01 and t02 VTIs established)",
   path:"t01 active traffic flowing: 3PLZ → Tenant-01-Zone → Enterprise Zone → Enterprise Backend-01 → Attempt from Tenant-01-Zone to reach Enterprise Backend-02 (which is in t02 path) → PA-FW zone-to-zone policy: Tenant-01-Zone → Tenant-02-Zone = NO POLICY (implicit deny) → traffic dropped → t02 sessions unaffected",
   dst:"t01 → t02 zone: traffic dropped (implicit deny or explicit deny rule)\nt02 active sessions: unaffected\nPA-FW traffic log: t01→t02 deny event",
   note:"Per-tenant zone isolation on PA-FW. No cross-tenant visibility at enterprise edge. Mirror of TC-CR05-002 but at enterprise PAN-OS layer."},
  {id:"TC-ENT-HA-001",grp:"ENT-HA",risk:"High",
   src:"PA-FW HA pair\n(pre-failover state verification)",
   path:"Verify HA state: Active unit = primary, Passive unit = secondary → show high-availability state: both nodes healthy → Confirm: /32 loopback reachable only via Active unit → Confirm: HA sync established (config sync + session sync) → Confirm: all tenant VTIs established to Active unit only",
   dst:"HA state: Active/Passive confirmed\n/32 loopback: responds only from Active unit\nHA sync: config + session sync ACTIVE\nAll tenant VTIs: to Active unit",
   note:"Pre-failover baseline. Required before TC-ENT-HA-002 through -006."},
  {id:"TC-ENT-HA-002",grp:"ENT-HA",risk:"Critical",
   src:"3PLZ Egress Proxy\n(active VTIs to PA-FW Active unit)",
   path:"Active tenant VTIs confirmed → Simulate Active unit failure (power off or HA suspend) → Passive unit promotion: show high-availability state → ACTIVE on Passive → /32 loopback: floats to new Active (GARP or HA DP floating IP) → 3PLZ DPD timeout fires → 3PLZ re-initiates IKE_SA_INIT to /32 loopback → IKE SA ESTABLISHED on new Active → VTI tunnel UP on new Active unit",
   dst:"Passive promoted: show high-availability state = ACTIVE\n/32 loopback: now reachable via new Active (GARP confirmed in pcap)\nVTI reconvergence: IKE_SA_INIT to /32 → IKE SA on new Active\nReconvergence time documented (from failover to VTI UP)",
   note:"Primary HA test. /32 loopback float is the critical event. GARP pcap on enterprise LAN confirms float. Reconvergence time = DPD timeout + IKE negotiation time."},
  {id:"TC-ENT-HA-003",grp:"ENT-HA",risk:"Critical",
   src:"Active traffic flows (multiple tenants)\n(during HA failover event)",
   path:"All tenant VTIs active + traffic flowing → Initiate Active unit failure → Measure: time from failure to /32 loopback GARP → time from GARP to 3PLZ DPD fire → time from DPD to VTI reconvergence → In-flight sessions during failover: session sync state at moment of failure determines outcome → Document: sessions preserved (if sync current) vs sessions RST (if sync lagged)",
   dst:"Reconvergence timeline documented per tenant\nSession sync state at failover: captured from PA-FW HA logs\nSession outcome: preserved or RST documented per tenant\nRecovery time objective (RTO) established",
   note:"Session continuity evidence. PA-FW session sync interval determines whether sessions survive. RTO becomes an input to enterprise SLA commitments."},
  {id:"TC-ENT-HA-004",grp:"ENT-HA",risk:"High",
   src:"PA-FW HA pair\n(Active unit recovery after failover)",
   path:"After TC-ENT-HA-002 failover: original Active unit recovers (power on) → confirm: recovered unit joins as Passive (does NOT pre-empt without preemption configured) → HA state: new Active remains Active, recovered unit = Passive → Config sync from new Active to recovered Passive → Confirm: no VTI disruption during recovery of original unit",

function badgeGrp(g){
  const m={
    'CR-01':'cr1','CR-02':'cr2','CR-03':'cr3','CR-04':'cr4',
    'CR-05':'cr5','CR-06':'cr6','CR-07':'cr7',
    'IPSec-VTI':'cripx','IPSec-CM':'cripx','IPSec-XFORM':'cripx','IPSec-LIFE':'cripx',
    'SVCINFRA-CERT':'crsvc','SVCINFRA-OTP':'crsvc',
    'IPSec-ASA':'crasa',
    'IPSec-CONN':'crcnn',
    'ENT-VTI':'crent','ENT-HA':'crent','ENT-SNAT':'crent','ENT-ZONE':'crent','ENT-VLAN':'crent'
  };
  return `<span class="cr-badge ${m[g]||'cripx'}">${g}</span>`;
}
function badgeLayer(l){
  const m={'1':'l1','2':'l2','3':'l3','4':'l4','I-Plane':'lip','Transport':'ltp','SVCINFRA':'lsvc'};
  const labels={'1':'Layer 1','2':'Layer 2','3':'Layer 3 — Adv','4':'Layer 4','I-Plane':'Insp. Plane','Transport':'Transport','SVCINFRA':'SVCINFRA'};
  return `<span class="layer-badge ${m[l]||'ltp'}">${labels[l]||l}</span>`;
}
function badgeRisk(r){
  const m={'Critical':'risk-critical','High':'risk-high','Medium':'risk-medium','Low':'risk-low'};
  return `<span class="risk-badge ${m[r]||'risk-medium'}">${r}</span>`;
}
function badgeDir(d){
  const m={'Inbound':'dir-in','Outbound':'dir-out','Control':'dir-ctrl','API':'dir-api','Enrollment':'dir-enroll'};
  return `<span class="cr-badge ${m[d]||'dir-ctrl'}">${d}</span>`;
}
function formatPath(p){
  return p.replace(/→/g,'<span class="arrow"> → </span>')
          .replace(/\[(.*?)\]/g,'<span style="color:#185FA5;font-weight:500">[$1]</span>')
          .replace(/\n/g,'<br>');
}

function render(){
  const grp=document.getElementById('grpFilter').value;
  const layer=document.getElementById('layerFilter').value;
  const risk=document.getElementById('riskFilter').value;
  const dir=document.getElementById('dirFilter').value;
  const q=document.getElementById('search').value.toLowerCase();
  let shown=0;
  const tb=document.getElementById('tbody');
  tb.innerHTML='';
  TC.forEach(t=>{
    const match=
      (!grp||t.grp===grp)&&
      (!layer||t.layer===layer)&&
      (!risk||t.risk===risk)&&
      (!dir||t.dir===dir)&&
      (!q||t.id.toLowerCase().includes(q)||t.path.toLowerCase().includes(q)||t.src.toLowerCase().includes(q)||t.dst.toLowerCase().includes(q)||(t.note&&t.note.toLowerCase().includes(q)));
    if(!match){return;}
    shown++;
    const tr=document.createElement('tr');
    tr.innerHTML=`
      <td><span class="tc">${t.id}</span>${t.note?`<br><span class="note" style="margin-top:3px;display:block">${t.note}</span>`:''}  </td>
      <td>${badgeGrp(t.grp)}</td>
      <td>${badgeLayer(t.layer)}</td>
      <td>${badgeDir(t.dir)}</td>
      <td><span class="source-dest">${t.src.replace(/\n/g,'<br>')}</span></td>
      <td><div class="path">${formatPath(t.path)}</div></td>
      <td><span class="source-dest">${t.dst.replace(/\n/g,'<br>')}</span></td>
      <td>${badgeRisk(t.risk)}</td>`;
    tb.appendChild(tr);
  });
  document.getElementById('shown').textContent=shown;
}

['grpFilter','layerFilter','riskFilter','dirFilter'].forEach(id=>
  document.getElementById(id).addEventListener('change',render));
document.getElementById('search').addEventListener('input',render);
render();
</script>
