 'SVCINFRA-CERT':'b-svc','SVCINFRA-OTP':'b-svc'
};
const RISK_CLASS={'Critical':'b-risk-c','High':'b-risk-h','Medium':'b-risk-m','Low':'b-risk-l'};

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function renderSwimlane(tc){
 const LW=118,SH=46,HH=58,PL=6,PR=6;
 const nL=tc.lanes.length,nS=tc.steps.length;
 const W=PL+nL*LW+PR,H=HH+nS*SH+16;
 const COLS={req:'#2a2a28',resp:'#6b6b67',fail:'#A32D2D',ctrl:'#185FA5',
             proc:null,audit:null,warn:'#854F0B',note:'#5a5a58'};
 let o=`<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:${W}px;display:block">`;
 o+=`<defs>
  <marker id="m-req" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><polygon points="0 0,7 2.5,0 5" fill="#2a2a28"/></marker>
  <marker id="m-resp" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><polygon points="0 0,7 2.5,0 5" fill="#6b6b67"/></marker>
  <marker id="m-fail" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><polygon points="0 0,7 2.5,0 5" fill="#A32D2D"/></marker>
  <marker id="m-ctrl" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><polygon points="0 0,7 2.5,0 5" fill="#185FA5"/></marker>
  <marker id="m-warn" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><polygon points="0 0,7 2.5,0 5" fill="#854F0B"/></marker>
 </defs>`;
 for(let i=0;i<nL;i++){
  const x=PL+i*LW;
  o+=`<rect x="${x}" y="0" width="${LW}" height="${H}" fill="${i%2===0?'#f9f9f7':'#f4f3f0'}" stroke="#deded8" stroke-width="0.5"/>`;
  o+=`<line x1="${x+LW/2}" y1="${HH}" x2="${x+LW/2}" y2="${H-8}" stroke="#d0d0c8" stroke-width="0.5" stroke-dasharray="3,3"/>`;
 }
 for(let i=0;i<nL;i++){
  const x=PL+i*LW,cx=x+LW/2;
  o+=`<rect x="${x}" y="0" width="${LW}" height="${HH}" fill="#e5e4dc" stroke="#ccccc4" stroke-width="0.5"/>`;
  const parts=tc.lanes[i].split('\n');
  const lh=13,sy=HH/2-(parts.length-1)*lh/2+4;
  parts.forEach((p,j)=>{
   o+=`<text x="${cx}" y="${sy+j*lh}" text-anchor="middle" font-size="9.5" font-weight="500" font-family="system-ui,sans-serif" fill="#2a2a28">${esc(p)}</text>`;
  });
 }
 tc.steps.forEach((step,si)=>{
  const[from,to,label,type]=step;
  const cy=HH+si*SH+SH/2;
  const lx=PL+from*LW+LW/2,rx=PL+to*LW+LW/2;
  if(from===to){
   const bw=Math.min(LW-10,108),bh=type==='proc'?22:type==='audit'?18:20;
   const bx=PL+from*LW+5,by=cy-bh/2;
   let bg='#f0efe8',stroke='#c8c8c0',tc2='#4a4a48',fs=8.5,fw='400',fi='normal';
   if(type==='audit'){bg='#e8e8e0';stroke='#b8b8b0';tc2='#6b6b67';fi='italic';fs=8;}
   if(type==='warn'){bg='#FEF3E2';stroke='#E8B84B';tc2='#854F0B';}
   if(type==='ctrl'){bg='#EAF0FB';stroke='#9ABDE8';tc2='#185FA5';}
   o+=`<rect x="${bx}" y="${by}" width="${bw}" height="${bh}" rx="3" fill="${bg}" stroke="${stroke}" stroke-width="0.5"/>`;
   const parts=label.split('\n');const lh2=9.5;
   const sy2=cy-(parts.length-1)*lh2/2+3;
   parts.forEach((p,j)=>{
    o+=`<text x="${bx+bw/2}" y="${sy2+j*lh2}" text-anchor="middle" font-size="${fs}" font-weight="${fw}" font-style="${fi}" font-family="system-ui,sans-serif" fill="${tc2}">${esc(p)}</text>`;
   });
  } else {
   const fwd=to>from;
   const sx=fwd?lx+LW/2-LW/2:lx-LW/2+LW/2;
   const ex=fwd?rx-LW/2+LW/2:rx+LW/2-LW/2;
   const x1=fwd?lx:lx,x2=fwd?rx:rx;
   const MARK={'req':'m-req','resp':'m-resp','fail':'m-fail','ctrl':'m-ctrl','warn':'m-warn'}[type]||'m-req';
   const STROKE={'req':'#2a2a28','resp':'#888','fail':'#A32D2D','ctrl':'#185FA5','warn':'#B87A1A'}[type]||'#2a2a28';
   const DASH=type==='resp'?'5,3':type==='fail'?'4,2':'none';
   const ox=fwd?-4:4,dx=fwd?rx-4:rx+4;
   const ax1=fwd?lx:lx, ax2=fwd?rx-7:rx+7;
   o+=`<line x1="${ax1}" y1="${cy}" x2="${ax2}" y2="${cy}" stroke="${STROKE}" stroke-width="1.2" ${DASH!=='none'?`stroke-dasharray="${DASH}"`:''}  marker-end="url(#${MARK})"/>`;
   const mx=(x1+x2)/2;
   const lparts=label.split('\n');
   const lh2=9;const lsy=cy-3-(lparts.length-1)*lh2/2;
   lparts.forEach((p,j)=>{
    const col={'req':'#2a2a28','resp':'#5a5a58','fail':'#A32D2D','ctrl':'#0C447C','warn':'#854F0B'}[type]||'#2a2a28';
    const fw2=type==='ctrl'?'500':'400';
    o+=`<text x="${mx}" y="${lsy+j*lh2}" text-anchor="middle" font-size="8.5" font-weight="${fw2}" font-family="system-ui,sans-serif" fill="${col}">${esc(p)}</text>`;
   });
  }
 });
 o+='</svg>';return o;
}

let selected=null;

function buildList(){
 const q=document.getElementById('search').value.toLowerCase();
 const gf=document.getElementById('grpF').value;
 const rf=document.getElementById('riskF').value;
 const el=document.getElementById('tclist');
 el.innerHTML='';
 TCS.forEach(tc=>{
  if(gf&&tc.grp!==gf)return;
  if(rf&&tc.risk!==rf)return;
  if(q&&!tc.id.toLowerCase().includes(q)&&!tc.title.toLowerCase().includes(q))return;
  const div=document.createElement('div');
  div.className='tc-item'+(selected===tc.id?' active':'');
  div.innerHTML=`<div class="tid">${tc.id}</div><div class="ttitle">${tc.title}</div>
   <div class="tbadges"><span class="badge ${GRP_CLASS[tc.grp]||'b-ipx'}">${tc.grp}</span><span class="badge ${RISK_CLASS[tc.risk]||'b-risk-m'}">${tc.risk}</span></div>`;
  div.onclick=()=>selectTC(tc);
  el.appendChild(div);
 });
}

function selectTC(tc){
 selected=tc.id;
 document.getElementById('tc-title').textContent=tc.id+' — '+tc.title;
 document.getElementById('tc-meta').innerHTML=
  `<span class="badge ${GRP_CLASS[tc.grp]||'b-ipx'}" style="font-size:11px;padding:2px 8px">${tc.grp}</span>`+
  `<span class="badge ${RISK_CLASS[tc.risk]||'b-risk-m'}" style="font-size:11px;padding:2px 8px">${tc.risk} risk</span>`+
  `<span>${tc.lanes.length} lanes · ${tc.steps.length} steps</span>`;
 document.getElementById('tc-note').textContent=tc.note||'';
 const dw=document.getElementById('diagram-wrap');
 dw.innerHTML=renderSwimlane(tc);
 buildList();
}

document.getElementById('search').addEventListener('input',buildList);
document.getElementById('grpF').addEventListener('change',buildList);
document.getElementById('riskF').addEventListener('change',buildList);
buildList();
if(TCS.length>0)selectTC(TCS[0]);
</script>
