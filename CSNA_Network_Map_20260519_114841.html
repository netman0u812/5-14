const TOTAL = 88077;

let activeZone = 0;
let expandedSite = null;

// ── Zone strip ────────────────────────────────────────────────────────────────
function buildStrip() {
  const strip = document.getElementById('zone-strip');
  ZONES.forEach((z, i) => {
    const seg = document.createElement('div');
    seg.className = 'zone-strip-seg';
    seg.style.cssText = `flex:${z.total};background:${z.color};cursor:pointer`;
    seg.title = `${z.name}: ${z.total.toLocaleString()}`;
    seg.onclick = () => selectZone(i);
    strip.appendChild(seg);
  });
}

// ── Sidebar ───────────────────────────────────────────────────────────────────
function buildSidebar() {
  const aside = document.getElementById('sidebar');
  aside.innerHTML = '';
  ZONES.forEach((z, i) => {
    const item = document.createElement('div');
    item.className = 'zone-item' + (i === activeZone ? ' active' : '');
    item.style.setProperty('--zone-color', z.color);
    item.innerHTML = `
      <div class="zone-dot" style="background:${z.color}"></div>
      <span class="zone-name">${z.name}</span>
      <span class="zone-count">${z.total.toLocaleString()}</span>
      <span class="zone-pct">${(100*z.total/TOTAL).toFixed(1)}%</span>`;
    item.onclick = () => selectZone(i);
    aside.appendChild(item);
  });
}

// ── Main panel ────────────────────────────────────────────────────────────────
function buildMain(searchTerm) {
  const panel = document.getElementById('main-panel');
  const z = ZONES[activeZone];
  const maxSiteTotal = Math.max(...z.sites.map(s => s.total));

  let sites = z.sites;
  if (searchTerm) {
    const q = searchTerm.toLowerCase();
    sites = sites.filter(s => s.name.toLowerCase().includes(q));
  }

  panel.innerHTML = `
    <div class="zone-header">
      <div class="zone-badge" style="background:${z.bg};color:${z.color}">
        <span style="width:8px;height:8px;border-radius:50%;background:${z.color};display:inline-block"></span>
        ${z.name}
      </div>
      <div class="zone-total" style="color:${z.color}">${z.total.toLocaleString()}</div>
      <div class="zone-desc">${z.desc} · ${z.sites.length} sites</div>
    </div>
    <div class="search-wrap">
      <input type="text" placeholder="Filter sites…" id="site-search"
        value="${searchTerm || ''}"
        oninput="buildMain(this.value)">
    </div>
    <div class="site-grid" id="site-grid"></div>`;

  const grid = document.getElementById('site-grid');

  if (sites.length === 0) {
    grid.innerHTML = '<div class="no-results">No sites match your search.</div>';
    return;
  }

  sites.forEach(site => {
    const card = document.createElement('div');
    const isExpanded = expandedSite === site.name;
    card.className = 'site-card' + (isExpanded ? ' expanded' : '');
    card.style.setProperty('--zone-color', z.color);

    const maxNodeCount = site.nodes.length ? Math.max(...site.nodes.map(n => n.count)) : 1;

    const nodeBars = site.nodes.map(n => `
      <div class="node-row">
        <span class="node-label">${n.type}</span>
        <div class="node-bar-wrap">
          <div class="node-bar" style="width:${Math.round(100*n.count/maxNodeCount)}%;background:${z.color}"></div>
        </div>
        <span class="node-val">${n.count.toLocaleString()}</span>
      </div>`).join('');

    card.innerHTML = `
      <div class="site-name">
        <span>${site.name}</span>
        <span class="count">${site.total.toLocaleString()}</span>
      </div>
      <div class="node-bars">${nodeBars}</div>`;

    card.onclick = () => {
      expandedSite = isExpanded ? null : site.name;
      buildMain(searchTerm);
    };

    grid.appendChild(card);
  });
}

function selectZone(i) {
  activeZone = i;
  expandedSite = null;
  buildSidebar();
  buildMain('');
  document.getElementById('site-search') && document.getElementById('site-search').focus();
}

// ── Init ──────────────────────────────────────────────────────────────────────
buildStrip();
buildSidebar();
buildMain('');
</script>
